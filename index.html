      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

      button{cursor:pointer;font:inherit}
      a{color:inherit;text-decoration:none}
      /* Layout utilities */
      #root{min-height:100vh;display:flex;flex-direction:column}
      .min-h-screen{min-height:100vh}
      .container{width:100%;max-width:1280px;margin:0 auto;padding:0 1rem}
      /* Positioning */
      .relative{position:relative}.absolute{position:absolute}.fixed{position:fixed}.sticky{position:sticky}
      .inset-0{inset:0}.top-0{top:0}.left-0{left:0}.right-0{right:0}.z-50{z-index:50}
      /* Display & Flex */
      .flex{display:flex}.inline-flex{display:inline-flex}.hidden{display:none}.block{display:block}

      .items-center{align-items:center}.justify-center{justify-content:center}.justify-between{justify-content:space-between}

      /* Sizing */

      .h-8{height:2rem}.h-12{height:3rem}
      /* Object fit */

      /* Spacing */

      .mx-auto{margin-left:auto;margin-right:auto}
      /* Text */
      .text-center{text-align:center}.text-white{color:#fff}.text-black{color:#000}
      .font-bold{font-weight:700}.font-semibold{font-weight:600}
      .text-sm{font-size:0.875rem}.text-lg{font-size:1.125rem}.text-xl{font-size:1.25rem}
      .text-2xl{font-size:1.5rem}.text-3xl{font-size:1.875rem}.text-4xl{font-size:2.25rem}
      /* Background & Colors */

      .bg-primary{background-color:#ffda00}
      /* Borders */
      .rounded{border-radius:0.25rem}.rounded-lg{border-radius:0.5rem}.rounded-full{border-radius:9999px}
      .border{border-width:1px}.border-b{border-bottom-width:1px}
      /* Effects */

      .opacity-50{opacity:0.5}.opacity-70{opacity:0.7}.opacity-90{opacity:0.9}
      /* Transitions */

      /* Prevent FOUC */

      @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
      /* Font display swap */
      @font-face{font-family:Barlow;font-display:swap;src:local('Barlow')}
      /* Hide skeleton when app loads */

      /* Responsive */

    </style>
    
    <!-- Make Vite CSS non-render-blocking -->
    <script>
      (function(){
        // Convert render-blocking CSS to async loading
        var observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            mutation.addedNodes.forEach(function(node) {
              if (node.tagName === 'LINK' && node.rel === 'stylesheet' && node.href && node.href.includes('/assets/')) {
                // Use media swap technique for async CSS loading
                node.media = 'print';
                node.onload = function() { this.media = 'all'; };
              }
            });
          });
        });
        observer.observe(document.head, { childList: true });
        // Disconnect after 5s to prevent memory leaks
        setTimeout(function() { observer.disconnect(); }, 5000);
      })();
    </script>

    <!-- Initial skeleton for faster FCP - hidden when React hydrates -->

    <script>
      // Remove skeleton as soon as React renders
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          const skeleton = document.getElementById('initial-skeleton');
          if (skeleton) skeleton.remove();
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>

    <!-- Google Tag Manager - Load only after user interaction for best performance -->
    <script>
      (function() {
        var gtmLoaded = false;
        function loadGTM() {
          if (gtmLoaded) return;
          gtmLoaded = true;
          window.dataLayer = window.dataLayer || [];
          window.dataLayer.push({'gtm.start': new Date().getTime(), event: 'gtm.js'});
          var j = document.createElement('script');
          j.async = true;
          j.src = 'https://www.googletagmanager.com/gtm.js?id=GTM-WK894PKV';
          document.head.appendChild(j);
          // Remove event listeners after loading
          document.removeEventListener('scroll', loadGTM);
          document.removeEventListener('click', loadGTM);
          document.removeEventListener('touchstart', loadGTM);
        }
        // Load GTM on first user interaction OR after 10s max
        document.addEventListener('scroll', loadGTM, {once: true, passive: true});
        document.addEventListener('click', loadGTM, {once: true});
        document.addEventListener('touchstart', loadGTM, {once: true, passive: true});
        setTimeout(loadGTM, 10000);
      })();
    </script>
