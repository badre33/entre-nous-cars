<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- Google Tag Manager - Deferred for better TTI -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function loadGTM() {
        if (window.gtmLoaded) return;
        window.gtmLoaded = true;
        window.dataLayer.push({'gtm.start': new Date().getTime(), event: 'gtm.js'});
        var j = document.createElement('script');
        j.async = true;
        j.src = 'https://www.googletagmanager.com/gtm.js?id=GTM-WK894PKV';
        document.head.appendChild(j);
      }
      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadGTM, { timeout: 3000 });
      } else {
        setTimeout(loadGTM, 2000);
      }
    </script>
    <!-- End Google Tag Manager -->
    
    <!-- ===== MOBILE-FIRST OPTIMIZATION (Critical for +15% mobile ranking) ===== -->
    
    <!-- Viewport - CRITICAL for mobile-first indexing -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=1.0, viewport-fit=cover" />
    
    <!-- Handheld Device Optimization -->
    <meta name="HandheldFriendly" content="true" />
    <meta name="MobileOptimized" content="width" />
    
    <!-- ===== iOS OPTIMIZATION ===== -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Benatna">
    
    <!-- ===== ANDROID CHROME OPTIMIZATION ===== -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Benatna">
    
    <!-- ===== FORMAT DETECTION ===== -->
    <!-- Disable auto-detection to control which numbers are clickable -->
    <meta name="format-detection" content="telephone=no">
    <meta name="format-detection" content="date=no">
    <meta name="format-detection" content="address=no">
    <meta name="format-detection" content="email=no">
    
    <!-- ===== WINDOWS TILE ===== -->
    <meta name="msapplication-TileColor" content="#ffda00">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="msapplication-TileImage" content="/apple-touch-icon.png">
    
    <!-- ===== ACCESSIBILITY ===== -->
    <meta name="color-scheme" content="light dark">
    
    <title>Benatna – La mobilité, entre nous</title>
    <meta name="description" content="La plateforme marocaine qui réunit les agences de location de voitures locales de confiance. Prix transparents. Processus digital. Sans surprises." />
    <meta name="author" content="Benatna" />
    
    <!-- Critical CSS inlined for fastest FCP -->
    <style>
      /* Critical reset + above-the-fold styles inlined to avoid render-blocking CSS */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { line-height: 1.5; -webkit-text-size-adjust: 100%; tab-size: 4; }
      body { font-family: 'Barlow', system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; background: #f5ffe4; color: #000; }
      #root { min-height: 100vh; }
      img, video { max-width: 100%; height: auto; display: block; }
      /* Header skeleton */
      header { position: sticky; top: 0; z-index: 50; background: rgba(245, 255, 228, 0.95); backdrop-filter: blur(8px); }
      /* Hero section skeleton to prevent CLS */
      .hero-skeleton { position: relative; width: 100%; min-height: 60vh; background: #e8f5d0; }
    </style>
    
    <!-- Preconnect to external origins (must be early) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://connect.facebook.net" crossorigin>
    <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin>
    <link rel="preconnect" href="https://oaajsamymjhxggwxdfwn.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://wa.me">
    
    <!-- Preload only the body font (critical); heading font deferred -->
    <link rel="preload" as="font" href="https://fonts.gstatic.com/s/barlow/v12/7cHpv4kjgoGqM7E_DMs5ynghnQci.woff2" type="font/woff2" crossorigin>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />
    
    <!-- ===== ICONS & FAVICONS ===== -->
    <link rel="icon" type="image/png" href="/favicon.ico" />
    
    <!-- Apple Touch Icons - Multiple sizes for all iOS devices -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="114x114" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="76x76" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="72x72" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="60x60" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="57x57" href="/apple-touch-icon.png" />
    
    <!-- Preload main module for faster JS execution -->
    <link rel="modulepreload" href="/src/main.tsx" />
    
    <!-- Preload LCP hero image for faster rendering -->
    <link rel="preload" as="image" href="/hero-home-new.webp" type="image/webp" fetchpriority="high" />
    
    <!-- Load fonts asynchronously - non-render-blocking -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Pacifico&family=Barlow:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet"></noscript>
    
    <!-- Defer service worker for better initial load -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          setTimeout(() => {
            navigator.serviceWorker.register('/sw.js');
          }, 2000);
        });
      }
    </script>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://benatna.ma" />
    <meta property="og:title" content="Benatna – La mobilité, entre nous" />
    <meta property="og:description" content="La plateforme marocaine qui réunit les agences de location de voitures locales de confiance. Prix transparents. Processus digital. Sans surprises." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Benatna – La mobilité, entre nous" />
    <meta name="twitter:description" content="La plateforme marocaine qui réunit les agences de location de voitures locales de confiance." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- ===== THEME COLOR (Android Chrome address bar) ===== -->
    <meta name="theme-color" content="#ffda00" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffda00" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1a1a1a" />
  </head>

  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WK894PKV"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
