<!doctype html>

  <head>
    <meta charset="UTF-8" />
    <!-- Google Tag Manager - Deferred for better TTI -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function loadGTM() {
        if (window.gtmLoaded) return;
        window.gtmLoaded = true;
        window.dataLayer.push({'gtm.start': new Date().getTime(), event: 'gtm.js'});
        var j = document.createElement('script');
        j.async = true;
        j.src = 'https://www.googletagmanager.com/gtm.js?id=GTM-WK894PKV';
        document.head.appendChild(j);
      }
      // Defer GTM loading significantly to move out of critical path - 10s timeout
      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadGTM, { timeout: 10000 });
      } else {
        setTimeout(loadGTM, 8000);
      }
    </script>
    <!-- End Google Tag Manager -->
    
    <!-- ===== MOBILE-FIRST OPTIMIZATION (Critical for +15% mobile ranking) ===== -->

    <link rel="preconnect" href="https://connect.facebook.net" crossorigin>

    <link rel="preconnect" href="https://oaajsamymjhxggwxdfwn.supabase.co" crossorigin>
    <link rel="preconnect" href="https://client.crisp.chat" crossorigin>
    <link rel="dns-prefetch" href="https://wa.me">
    
    <!-- Critical CSS for FCP - minimal above-the-fold styles only -->
    <style>
      /* Critical reset */
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html{line-height:1.5;-webkit-text-size-adjust:100%;font-family:system-ui,-apple-system,sans-serif}
      body{background:#f5ffe4;color:#000;min-height:100vh}
      /* Layout */
      #root{min-height:100vh;display:flex;flex-direction:column}
      .container{width:100%;max-width:1280px;margin:0 auto;padding:0 1rem}
      /* Hero critical */
      .relative{position:relative}.absolute{position:absolute}.inset-0{inset:0}
      .w-full{width:100%}.h-full{height:100%}.object-cover{object-fit:cover}
      .flex{display:flex}.items-center{align-items:center}.justify-center{justify-content:center}
      .text-center{text-align:center}.text-white{color:#fff}
      /* Header critical - skeleton */
      .skeleton-header{height:64px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;padding:0 16px}
      .skeleton-logo{width:32px;height:32px;background:#e5e7eb;border-radius:4px}
      /* Hero skeleton */
      .skeleton-hero{height:70vh;min-height:500px;background:linear-gradient(135deg,#1a1a1a 0%,#2a2a2a 100%);display:flex;align-items:center;justify-content:center}
      .skeleton-hero-content{text-align:center;color:#fff;padding:20px}
      .skeleton-hero h1{font-size:clamp(1.5rem,4vw,2.5rem);margin-bottom:16px;opacity:.9}
      .skeleton-hero p{font-size:1rem;opacity:.7}
      /* Prevent FOUC */
      .loading-skeleton{animation:pulse 1.5s ease-in-out infinite}
      @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
      /* Font display swap */
      @font-face{font-family:Barlow;font-display:swap;src:local('Barlow')}
      /* Hide skeleton when app loads */
      #root:not(:empty)+.initial-skeleton{display:none}
      #root:not(:empty)~.initial-skeleton{display:none}
    </style>
    
    <!-- Preload critical fonts for better LCP -->
    <link rel="preload" as="font" href="https://fonts.gstatic.com/s/barlow/v12/7cHpv4kjgoGqM7E_DMs5ynghnQci.woff2" type="font/woff2" crossorigin>

    <!-- Load fonts with optimal loading strategy -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Pacifico&family=Barlow:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">

    <!-- Defer service worker for better initial load -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          setTimeout(() => {
            navigator.serviceWorker.register('/sw.js');
          }, 2000);
        });
      }
    </script>

  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WK894PKV"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    
    <div id="root"></div>
    
    <!-- Initial skeleton for faster FCP - hidden when React hydrates -->
    <div class="initial-skeleton" id="initial-skeleton">
      <div class="skeleton-header">
        <div class="skeleton-logo loading-skeleton"></div>
      </div>
      <div class="skeleton-hero">
        <div class="skeleton-hero-content">
          <h1>Location de Voiture au Maroc</h1>
          <p>Chargement en cours...</p>
        </div>
      </div>
    </div>
    <script>
      // Remove skeleton as soon as React renders
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          const skeleton = document.getElementById('initial-skeleton');
          if (skeleton) skeleton.remove();
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>
    
    <!-- Fallback content for crawlers that don't execute JS -->
    <noscript>
      <div style="padding: 40px; text-align: center; font-family: system-ui, sans-serif;">

          <a href="/location-voiture-agadir">Agadir</a> |
          <a href="/louer">Voir les véhicules</a>
        </nav>
      </div>
    </noscript>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
