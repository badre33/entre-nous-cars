<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- Google Tag Manager - Deferred for better TTI -->
    <script>

      function loadGTM() {
        if (window.gtmLoaded) return;
        window.gtmLoaded = true;
        window.dataLayer.push({'gtm.start': new Date().getTime(), event: 'gtm.js'});
        var j = document.createElement('script');
        j.async = true;
        j.src = 'https://www.googletagmanager.com/gtm.js?id=GTM-WK894PKV';
        document.head.appendChild(j);
      }
      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadGTM, { timeout: 3000 });
      } else {
        setTimeout(loadGTM, 2000);
      }
    </script>
    <!-- End Google Tag Manager -->
    
    <!-- Google Analytics 4 (gtag.js) - Deferred for better TTI -->
    <script>
      function loadGA4() {
        if (window.ga4Loaded) return;
        window.ga4Loaded = true;
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-W46ETH2KPN';
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', 'G-W46ETH2KPN', { send_page_view: true });
      }
      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadGA4, { timeout: 3000 });
      } else {
        setTimeout(loadGA4, 2000);
      }
    </script>
    <!-- End Google Analytics 4 -->
    
    <!-- ===== MOBILE-FIRST OPTIMIZATION (Critical for +15% mobile ranking) ===== -->
    
    <!-- Viewport - CRITICAL for mobile-first indexing -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=1.0, viewport-fit=cover" />
    
    <!-- Canonical URL (default, can be overridden per page via Helmet) -->
    <link rel="canonical" href="https://benatna.ma/" />
    
    <!-- Handheld Device Optimization -->
    <meta name="HandheldFriendly" content="true" />
    <meta name="MobileOptimized" content="width" />
    
    <!-- ===== iOS OPTIMIZATION ===== -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Benatna">
    
    <!-- ===== ANDROID CHROME OPTIMIZATION ===== -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Benatna">
    
    <!-- ===== FORMAT DETECTION ===== -->
    <!-- Disable auto-detection to control which numbers are clickable -->
    <meta name="format-detection" content="telephone=no">
    <meta name="format-detection" content="date=no">
    <meta name="format-detection" content="address=no">
    <meta name="format-detection" content="email=no">
    
    <!-- ===== WINDOWS TILE ===== -->
    <meta name="msapplication-TileColor" content="#ffda00">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="msapplication-TileImage" content="/apple-touch-icon.png">
    
    <!-- ===== ACCESSIBILITY ===== -->
    <meta name="color-scheme" content="light dark">
    
    <title>Benatna – La mobilité, entre nous</title>
    <meta name="description" content="La plateforme marocaine qui réunit les agences de location de voitures locales de confiance. Prix transparents. Processus digital. Sans surprises." />
    <meta name="author" content="Benatna" />

    <!-- Google Search Console verification -->
    <meta name="google-site-verification" content="0IxqKfK_zFQH7CAbF7ngG7rkQs13V5dn3Ivr6FqQKCQ" />
    
    <!-- Critical CSS inlined for fastest FCP -->
    <style>
      /* Critical reset + above-the-fold styles inlined to avoid render-blocking CSS */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { line-height: 1.5; -webkit-text-size-adjust: 100%; tab-size: 4; }
      body { font-family: 'Barlow', system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; background: #f5ffe4; color: #000; }
      #root { min-height: 100vh; }
      img, video { max-width: 100%; height: auto; display: block; }
      /* Header skeleton */
      header { position: sticky; top: 0; z-index: 50; background: rgba(245, 255, 228, 0.95); backdrop-filter: blur(8px); }
      /* Hero section skeleton to prevent CLS */
      .hero-skeleton { position: relative; width: 100%; min-height: 60vh; background: #e8f5d0; }

      /* App Shell — visible BEFORE React mounts. Removed on mount via replaceChild. */
      /* This gives an instant LCP (~1.5-2s on 4G) instead of waiting for ~900KB JS to parse. */
      .app-shell-hero {
        position: relative; width: 100%; min-height: 90vh;
        display: flex; align-items: center; justify-content: center;
        background: #1a2e1a;
        overflow: hidden;
      }
      .app-shell-hero__img {
        position: absolute; inset: 0; width: 100%; height: 100%;
        object-fit: cover; z-index: 0;
        filter: brightness(0.55);
      }
      .app-shell-hero__content {
        position: relative; z-index: 1;
        text-align: center; padding: 1rem 1.5rem;
        max-width: 900px; color: #fff;
      }
      .app-shell-hero__h1 {
        font-family: 'Pacifico', system-ui, sans-serif;
        font-size: clamp(1.75rem, 6vw, 4rem); line-height: 1.1;
        margin-bottom: 0.75rem;
        text-shadow: 0 2px 8px rgba(0,0,0,0.5);
      }
      .app-shell-hero__sub {
        font-size: clamp(0.875rem, 2.5vw, 1.25rem); margin-bottom: 1.25rem;
        opacity: 0.95;
      }
      .app-shell-hero__badges {
        display: flex; flex-wrap: wrap; justify-content: center; gap: 0.5rem;
      }
      .app-shell-hero__badge {
        display: inline-flex; align-items: center; gap: 0.375rem;
        background: rgba(255,255,255,0.95); color: #2d4a1f;
        padding: 0.5rem 0.875rem; border-radius: 9999px;
        font-size: 0.75rem; font-weight: 600;
        box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      }
      @media (min-width: 640px) {
        .app-shell-hero__badge { padding: 0.625rem 1rem; font-size: 0.875rem; }
      }
    </style>
    
    <!-- Preconnect to external origins (must be early) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://connect.facebook.net" crossorigin>
    <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin>
    <link rel="preconnect" href="https://oaajsamymjhxggwxdfwn.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://wa.me">
    
    <!-- Preload only the body font (critical); heading font deferred -->
    <link rel="preload" as="font" href="https://fonts.gstatic.com/s/barlow/v12/7cHpv4kjgoGqM7E_DMs5ynghnQci.woff2" type="font/woff2" crossorigin>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />
    
    <!-- ===== ICONS & FAVICONS ===== -->
    <link rel="icon" type="image/png" href="/favicon.ico" />
    
    <!-- Apple Touch Icons - Multiple sizes for all iOS devices -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="114x114" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="76x76" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="72x72" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="60x60" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="57x57" href="/apple-touch-icon.png" />
    
    <!-- Preload main module for faster JS execution -->
    <link rel="modulepreload" href="/src/main.tsx" />
    
    <!-- Preload LCP hero image for faster rendering -->
    <link rel="preload" as="image" href="/hero-home-new.webp" type="image/webp" fetchpriority="high" />
    
    <!-- Load fonts asynchronously - non-render-blocking -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Pacifico&family=Barlow:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet"></noscript>
    
    <!-- Defer service worker for better initial load -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          setTimeout(() => {
            navigator.serviceWorker.register('/sw.js');
          }, 2000);
        });
      }
    </script>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://benatna.ma" />
    <meta property="og:title" content="Benatna – La mobilité, entre nous" />
    <meta property="og:description" content="La plateforme marocaine qui réunit les agences de location de voitures locales de confiance. Prix transparents. Processus digital. Sans surprises." />
    <meta property="og:image" content="https://benatna.ma/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Benatna – La mobilité, entre nous" />
    <meta name="twitter:description" content="La plateforme marocaine qui réunit les agences de location de voitures locales de confiance." />
    <meta name="twitter:image" content="https://benatna.ma/og-image.png" />

    <!-- ===== THEME COLOR (Android Chrome address bar) ===== -->
    <meta name="theme-color" content="#ffda00" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffda00" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1a1a1a" />
  </head>

  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WK894PKV"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    
    <div id="root">
      <!--
        APP SHELL — static HTML shown BEFORE React mounts.
        Gives instant LCP (Largest Contentful Paint) on mobile — typically 1.5-2s
        on 4G instead of 6+s waiting for the React bundle to parse and execute.
        React replaces this content via createRoot/hydrateRoot when ready.
      -->
      <section class="app-shell-hero" aria-label="Location de voiture au Maroc">
        <img
          class="app-shell-hero__img"
          src="/hero-home-new.webp"
          alt="Location de voiture au Maroc avec Benatna"
          width="1344"
          height="768"
          fetchpriority="high"
        />
        <div class="app-shell-hero__content">
          <h1 class="app-shell-hero__h1">Location de voiture au Maroc, entre nous.</h1>
          <p class="app-shell-hero__sub">Réservez dès 300 DH/jour auprès d\'agences locales vérifiées. Sans carte de crédit, sans surprise.</p>
          <div class="app-shell-hero__badges">
            <span class="app-shell-hero__badge">💰 Dès 300 DH/jour</span>
            <span class="app-shell-hero__badge">💳 Sans carte de crédit</span>
            <span class="app-shell-hero__badge">📱 WhatsApp en 2 min</span>
          </div>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
